<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>建筑外墙健康监测系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* 主容器 */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        /* 卡片通用样式 */
        .card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        /* 三栏布局 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        /* 统计卡片 */
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* 按钮样式 */
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* 表格样式 */
        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .report-table th,
        .report-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .report-table th {
            background: #667eea;
            color: white;
            font-weight: 500;
        }

        .report-table tr:hover {
            background: #f9f9f9;
        }

        /* 状态标签 */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .badge-danger {
            background: #fee2e2;
            color: #dc2626;
        }

        .badge-warning {
            background: #fef3c7;
            color: #d97706;
        }

        .badge-success {
            background: #d1fae5;
            color: #059669;
        }

        /* 设置面板 */
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-label {
            font-weight: 500;
            color: #333;
        }

        .font-size-control {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .font-size-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #f0f0f0;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .font-size-btn:hover {
            background: #e0e0e0;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        /* 文件上传区域（幌子）*/
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            background: #fafafa;
            cursor: pointer;
            transition: 0.2s;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f5f3ff;
        }

        .upload-area p {
            color: #999;
        }

        /* 可调节字体 */
        body.small-font {
            font-size: 12px;
        }
        body.normal-font {
            font-size: 14px;
        }
        body.large-font {
            font-size: 16px;
        }
    </style>
</head>
<body class="normal-font">
<div class="app-container">
    <!-- 头部 -->
    <div class="header">
        <h1>🏢 建筑外墙健康监测系统</h1>
        <p>AI智能检测 | 热成像分析 | 实时报告</p>
    </div>

    <!-- 三个快捷入口 -->
    <div class="dashboard">
        <div class="card stat-card" onclick="showHistory()">
            <div class="stat-number">📋</div>
            <div class="stat-label">历史报告</div>
        </div>
        <div class="card stat-card" onclick="showImport()">
            <div class="stat-number">📁</div>
            <div class="stat-label">导入外部数据</div>
        </div>
        <div class="card stat-card" onclick="showSettings()">
            <div class="stat-number">⚙️</div>
            <div class="stat-label">设置</div>
        </div>
    </div>

    <!-- 最新报告预览 -->
    <div class="card">
        <h2 style="margin-bottom: 20px;">📊 最新检测报告</h2>
        <div id="reportPreview">
            <!-- 动态内容 -->
        </div>
    </div>
</div>

<!-- 历史报告模态框 -->
<div id="historyModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📋 历史报告</h2>
            <button class="close-btn" onclick="closeModal('historyModal')">&times;</button>
        </div>
        <div id="historyContent"></div>
    </div>
</div>

<!-- 导入数据模态框（幌子） -->
<div id="importModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📁 导入外部数据</h2>
            <button class="close-btn" onclick="closeModal('importModal')">&times;</button>
        </div>
        <div class="upload-area" onclick="showImportWarning()">
            <p>📤 点击或拖拽文件到此上传</p>
            <p style="font-size: 12px; margin-top: 10px;">支持格式: JSON, CSV, XLSX</p>
        </div>
        <p style="margin-top: 20px; color: #999; font-size: 12px; text-align: center;">* 此功能开发中，敬请期待</p>
    </div>
</div>

<!-- 设置模态框 -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>⚙️ 系统设置</h2>
            <button class="close-btn" onclick="closeModal('settingsModal')">&times;</button>
        </div>
        <div class="setting-item">
            <span class="setting-label">🔤 字体大小</span>
            <div class="font-size-control">
                <button class="font-size-btn" onclick="setFontSize('small')">小</button>
                <button class="font-size-btn" onclick="setFontSize('normal')">中</button>
                <button class="font-size-btn" onclick="setFontSize('large')">大</button>
            </div>
        </div>
        <div class="setting-item">
            <span class="setting-label">🌓 主题</span>
            <div style="display: flex; gap: 10px;">
                <button class="btn-secondary" style="padding: 8px 16px;" onclick="alert('主题功能开发中')">浅色</button>
                <button class="btn-secondary" style="padding: 8px 16px;" onclick="alert('主题功能开发中')">深色</button>
            </div>
        </div>
        <div class="setting-item">
            <span class="setting-label">ℹ️ 关于</span>
            <span style="color: #999; font-size: 12px;">版本 v1.0 | AI检测系统</span>
        </div>
    </div>
</div>

<script>
    // 报告数据
    const reportData = {
        building: "1号楼",
        floor: "1楼",
        totalArea: 1250.5,
        defects: [
            { type: "渗漏", count: 4, area: 23.6, standard: "≤0.2%", actual: "1.89%", needRepair: true },
            { type: "空鼓", count: 1, area: 8.2, standard: "≤0.1%", actual: "0.66%", needRepair: true }
        ],
        standardJudge: "根据《建筑装饰装修工程质量验收规范》GB 50210-2018，渗漏面积超标，空鼓面积超标，建议立即修补！",
        conclusion: "⚠️ 不合格，需要修补"
    };

    // 历史报告列表
    const historyList = [
        {
            id: 1,
            date: "2026-04-08",
            building: "1号楼",
            floor: "1楼",
            leakage: 4,
            hollow: 1,
            totalArea: 1250.5,
            conclusion: "不合格"
        },
        {
            id: 2,
            date: "2026-04-01",
            building: "1号楼",
            floor: "1楼",
            leakage: 3,
            hollow: 0,
            totalArea: 1250.5,
            conclusion: "合格"
        },
        {
            id: 3,
            date: "2026-03-25",
            building: "1号楼",
            floor: "1楼",
            leakage: 2,
            hollow: 1,
            totalArea: 1250.5,
            conclusion: "不合格"
        }
    ];

    // 渲染最新报告
    function renderLatestReport() {
        const container = document.getElementById('reportPreview');
        let html = `
            <div style="background: #f8f9fa; border-radius: 16px; padding: 20px; margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
                    <div><strong>🏠 检测建筑：</strong> ${reportData.building}</div>
                    <div><strong>📍 检测楼层：</strong> ${reportData.floor}</div>
                    <div><strong>📐 总面积：</strong> ${reportData.totalArea} m²</div>
                </div>
            </div>
            <table class="report-table">
                <thead>
                    <tr>
                        <th>缺陷类型</th>
                        <th>数量</th>
                        <th>面积(m²)</th>
                        <th>占比</th>
                        <th>国家标准</th>
                        <th>是否需修补</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        reportData.defects.forEach(defect => {
            const percent = ((defect.area / reportData.totalArea) * 100).toFixed(2);
            html += `
                <tr>
                    <td><strong>${defect.type}</strong></td>
                    <td>${defect.count} 处</td>
                    <td>${defect.area}</td>
                    <td>${percent}%</td>
                    <td>${defect.standard}</td>
                    <td><span class="badge badge-danger">需要修补</span></td>
                </tr>
            `;
        });
        
        html += `
                </tbody>
            </table>
            <div style="margin-top: 20px; padding: 16px; background: #fef3c7; border-radius: 12px; border-left: 4px solid #d97706;">
                <strong>📋 国标判定：</strong><br>
                ${reportData.standardJudge}
            </div>
            <div style="margin-top: 15px; text-align: right;">
                <span class="badge ${reportData.conclusion === '不合格' ? 'badge-danger' : 'badge-success'}">${reportData.conclusion}</span>
            </div>
        `;
        
        container.innerHTML = html;
    }

    // 显示历史报告
    function showHistory() {
        const container = document.getElementById('historyContent');
        let html = '';
        
        historyList.forEach(report => {
            html += `
                <div style="background: #f8f9fa; border-radius: 16px; padding: 16px; margin-bottom: 15px; cursor: pointer;" onclick="viewDetail(${report.id})">
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
                        <div><strong>📅 ${report.date}</strong></div>
                        <div>🏠 ${report.building} ${report.floor}</div>
                        <div>💧 渗漏: ${report.leakage}处</div>
                        <div>🕳️ 空鼓: ${report.hollow}处</div>
                        <div><span class="badge ${report.conclusion === '不合格' ? 'badge-danger' : 'badge-success'}">${report.conclusion}</span></div>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
        document.getElementById('historyModal').style.display = 'flex';
    }

    // 查看详情（从历史报告中加载）
    function viewDetail(id) {
        const report = historyList.find(r => r.id === id);
        if (report) {
            alert(`📋 ${report.date}\n建筑：${report.building} ${report.floor}\n渗漏：${report.leakage}处\n空鼓：${report.hollow}处\n结论：${report.conclusion}\n详细报告请在主界面查看最新报告。`);
        }
        closeModal('historyModal');
    }

    // 显示导入数据（幌子）
    function showImport() {
        document.getElementById('importModal').style.display = 'flex';
    }

    function showImportWarning() {
        alert('📢 外部数据导入功能开发中，敬请期待！\n目前数据来自AI检测系统。');
    }

    // 显示设置
    function showSettings() {
        document.getElementById('settingsModal').style.display = 'flex';
    }

    // 关闭模态框
    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }

    // 设置字体大小
    function setFontSize(size) {
        const body = document.body;
        body.classList.remove('small-font', 'normal-font', 'large-font');
        if (size === 'small') body.classList.add('small-font');
        else if (size === 'normal') body.classList.add('normal-font');
        else if (size === 'large') body.classList.add('large-font');
        
        localStorage.setItem('fontSize', size);
        alert(`字体大小已调整为：${size === 'small' ? '小' : size === 'normal' ? '中' : '大'}`);
    }

    // 加载保存的字体设置
    function loadFontSize() {
        const savedSize = localStorage.getItem('fontSize');
        if (savedSize) {
            setFontSize(savedSize);
        }
    }

    // 点击模态框背景关闭
    window.onclick = function(event) {
        if (event.target.classList.contains('modal')) {
            event.target.style.display = 'none';
        }
    }

    // 初始化
    renderLatestReport();
    loadFontSize();
</script>
</body>
</html>
